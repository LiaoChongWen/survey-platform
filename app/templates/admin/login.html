<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者登入 — 問卷分析平台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%); min-height: 100vh; display: flex; align-items: center; }
    .login-card { border: none; border-radius: 18px; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card login-card p-4">
        <div class="text-center mb-4">
          <i class="bi bi-bar-chart-fill text-primary" style="font-size:2.5rem"></i>
          <h4 class="mt-2 fw-bold">問卷分析平台</h4>
          <p class="text-muted small">管理者登入</p>
        </div>
        {% if error %}
        <div class="alert alert-danger alert-sm py-2">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/login">
          <div class="mb-3">
            <label class="form-label fw-semibold">帳號</label>
            <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">密碼</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            <i class="bi bi-box-arrow-in-right me-1"></i>登入
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
