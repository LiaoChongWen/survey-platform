<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}問卷分析平台{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/custom.css">
  {% block head %}{% endblock %}
</head>
<body>
{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/admin/dashboard">
      <i class="bi bi-bar-chart-fill me-2"></i>問卷分析平台
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="/admin/dashboard"><i class="bi bi-speedometer2 me-1"></i>儀表板</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/admin/forms"><i class="bi bi-file-earmark-text me-1"></i>問卷管理</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/admin/analysis"><i class="bi bi-upload me-1"></i>資料分析</a>
        </li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="/admin/logout"><i class="bi bi-box-arrow-right me-1"></i>登出</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
{% endblock %}

<div class="{% block container_class %}container-fluid py-4{% endblock %}">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/alpine.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
